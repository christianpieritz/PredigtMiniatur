<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geistlicher Strand·Begleiter</title>
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --blue: #2F5496; 
            --gold: #7A5C2E;
            --bg: #fdfbf7;
            --dark: #2F4F4F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* 1. Globaler Standard für die gesamte Seite (Fließtext) */
        body {
            background-color: var(--bg); 
            color: var(--dark);
            font-family: 'Times New Roman', Times, serif; /* Fließtext standardmäßig antik/edel */
            letter-spacing: 0.02em;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 15px;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* 2. Gezielte Zuweisung für alle Überschriften und All-Caps-Elemente */
        h1,
        .cover p,
        .title, 
        .text-red-caps, 
        .text-red-allcaps, 
        .share-btn,
        nav a { 
            font-family: 'Cinzel', serif;
            letter-spacing: 0.1em; /* Cinzel wirkt mit etwas mehr Abstand noch edler */
        }

        .container {
            width: 100%;
            max-width: 430px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        h1 {
            color: var(--gold);
            font-size: clamp(22px, 7vw, 30px); 
            font-weight: 700;
            text-align: center;
            text-transform: uppercase;
        }

        .cover {
            position: relative;
            width: 100%;
        }

        .cover img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
        }

        .cover p {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            text-align: center;
            color: var(--gold);
            font-size: clamp(16px, 4.5vw, 20px);
            font-weight: bold;
            line-height: 1.4;
        }

        .intro {
            font-size: clamp(15px, 4.5vw, 17px);
            line-height: 1.6;
            text-align: center;
        }

        nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        nav a {
            display: block;
            width: 85%;
            max-width: 280px;
            text-align: center;
            background-color: var(--blue);
            color: var(--bg);
            text-decoration: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            border-radius: 4px;
            transition: background 0.2s;
        }

        nav a:active {
            transform: scale(0.98);
            background-color: #5E4622;
        }

        /* Klasse für den kleineren Impressum-Button */
        nav a.impressum {
        background-color: var(--gold);
            max-width: 180px;
            padding: 8px 15px;
            font-size: 12px;
            margin-top: 10px;
        }

        footer img {
            max-width: 120px;
            height: auto;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Geistlicher<br>Strand·Begleiter</h1>

        <div class="cover">
            <img src="Cover.jpg" alt="Cover">
            <p>Haltestellen für deinen Glauben in den Kaiserbädern.</p>
        </div>

        <p class="intro">
            Wenn Du in den Kaiserbädern unterwegs bist, klicke auf den jeweiligen Ort. Nimm dir einen Moment für dich.
        </p>

        <nav>
            <a href="promenade.html">Promenade</a>
            <a href="strandkorb.html">Strandkorb</a>
            <a href="strand.html">Am Strand</a>
            <a href="strandhafer.html">An den Dünen</a>
            <a href="rettungsturm.html">Am Rettungsturm</a>
            <a href="bernstein.html">Bernstein</a>
            <a href="seebruecke.html">Seebrücke</a>
            <a href="schiffe.html">Schiffe</a>
            <a href="kontakt.html" class="impressum">Kontakt</a>
        </nav>

        <footer>
            <img src="siegel.png" alt="Siegel">
        </footer>

    </div>

</body>
</html>
