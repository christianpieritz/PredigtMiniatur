<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS-Glaube</title>

    <meta name="theme-color" content="#fdfbf7">
    <meta name="apple-mobile-web-app-status-bar-style" content="#fdfbf7">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght=700&family=Cinzel:wght=400;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #fdfbf7; 
            font-family: 'Cinzel', serif; 
            color: #2F2F2F; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; /* Geändert für flüssiges Scrollen auf Mobilgeräten */
            align-items: center; 
            min-height: 100vh; 
            padding: 20px 15px; 
            user-select: none; 
            -webkit-user-select: none; 
            -webkit-tap-highlight-color: transparent; 
            -webkit-font-smoothing: antialiased; 
        }
        
        .page-wrapper { 
            color: inherit; 
            display: flex; 
            flex-direction: column; /* Auf Spalte gesetzt, um Inhalt, Bild und Tools sauber zu stapeln */
            justify-content: flex-start; 
            align-items: center; 
            width: 100%; 
            flex: 1; 
        }
        
        .container { 
            background-color: #fdfbf7; 
            width: 100%; 
            max-width: 440px; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
        }
        
        .title { text-transform: uppercase; color: #A81229; font-size: clamp(22px, 6vw, 28px); font-weight: 700; margin-bottom: clamp(30px, 8vw, 45px); text-align: center; line-height: 1.3; letter-spacing: 0.18em; width: 100%; }
        .content-blocks { width: 100%; margin-bottom: clamp(15px, 4vw, 25px); }
        .block { width: 100%; text-align: justify; text-justify: inter-word; font-weight: 400; font-size: clamp(14px, 3.8vw, 15px); letter-spacing: 0.08em; line-height: 1.75; margin-bottom: 20px; -webkit-hyphens: auto; -ms-hyphens: auto; hyphens: auto; }
        .initial { font-family: 'Cinzel Decorative', serif; float: left; font-size: clamp(3.2em, 12vw, 3.8em); line-height: 0.7; margin-top: 0.08em; margin-right: 0.08em; color: #A81229; font-weight: 700; }
        .quote-block { width: 100%; margin: clamp(25px, 6vw, 35px) 0; padding-left: 16px; border-left: 2px solid #A81229; text-align: left; }
        .quote-sub { font-weight: 400; font-size: clamp(14px, 4vw, 16px); letter-spacing: 0.07em; line-height: 1.6; color: #006994; -webkit-hyphens: auto; -ms-hyphens: auto; hyphens: auto; }
        .footer-wrapper { display: flex; flex-direction: column; align-items: center; width: 140px; margin-top: clamp(25px, 7vw, 40px); margin-bottom: 10px; }
        .image-container { width: 100%; margin-bottom: 12px; display: flex; justify-content: center; }
        .kreuz-img { width: 40%; height: auto; display: block; margin: 0 auto; }
        
        .share-btn { width: 100%; background: transparent; border: 1px solid #A81229; color: #A81229; padding: 6px 0; font-family: inherit; font-size: 11px; letter-spacing: 0.1em; cursor: pointer; border-radius: 4px; transition: all 0.2s ease; text-transform: uppercase; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; white-space: nowrap; }
        .share-btn-cp { color: #A81229; text-transform: none; opacity: 0.8; }
        .share-btn:active { background: #A81229; color: #fdfbf7; }
        .share-btn:active .share-btn-cp { color: #fdfbf7; opacity: 1; }

        /* NEU: Robustes Parallax-Sichtfenster */
        .devotional-image-wrapper {
            width: 100%;
            max-width: 440px; 
            height: 280px; 
            margin-top: 40px; 
            margin-bottom: 30px;
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background-color: #fdfbf7;
        }

        /* Das Bild gleitet geschmeidig im Hintergrund des Fensters mit */
        .devotional-img-parallax {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        /* Sanfte Verläufe (schmelzen das Bild oben und unten in den Hintergrund) */
        .devotional-image-wrapper::before,
        .devotional-image-wrapper::after {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 45px; 
            z-index: 2;
            pointer-events: none;
        }
        
        .devotional-image-wrapper::before {
            top: 0;
            background: linear-gradient(to bottom, #fdfbf7, transparent);
        }

        .devotional-image-wrapper::after {
            bottom: 0;
            background: linear-gradient(to top, #fdfbf7, transparent);
        }

        /* Kalender-Button */
        .calendar-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 0 15px;
            margin-bottom: 35px;
            text-align: center;
        }

        .calendar-btn {
            background: transparent;
            border: none;
            color: #006994; 
            font-family: inherit;
            font-size: 12px;
            letter-spacing: 0.08em;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            opacity: 0.75;
            transition: opacity 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .calendar-btn:active { opacity: 1; }

        /* Minimalistisches Feedback-Feld */
        .feedback-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 0 15px;
            margin-bottom: 40px;
            text-align: center;
        }

        .feedback-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(168, 18, 41, 0.25); 
            color: #2F2F2F;
            font-family: inherit;
            font-size: 14px;
            padding: 10px 0;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            border-radius: 0;
            -webkit-appearance: none;
        }

        .feedback-input:focus {
            border-bottom-color: #A81229;
        }

        .feedback-btn {
            background: transparent;
            border: none;
            color: #A81229;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 0.1em;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 12px;
            opacity: 0.7;
        }
        .feedback-btn:active { opacity: 1; }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <div id="captureArea" class="container">
            
            <div class="title" id="outputUeberschrift"></div>

            <div class="content-blocks">
                <div class="block">
                    <span class="initial" id="outputInitiale"></span>
                    <span id="outputText1"></span>
                </div>
                <div class="quote-block">
                    <div class="quote-sub" id="outputBibelvers"></div>
                </div>
                <div class="block" id="outputText2"></div>
            </div>

            <div class="footer-wrapper">
                <div class="image-container">
                    <img src="Buntkreuz.png" alt="Buntkreuz" class="kreuz-img">
                </div>
                <button id="shareButton" class="share-btn">
                    <span id="shareBtnText">Teilen <span class="share-btn-cp">(©cP)</span></span>
                </button>
            </div>
        </div>

        <div class="devotional-image-wrapper">
            <img src="xyz.jpg" alt="Andächtiges Bild" id="parallaxImg" class="devotional-img-parallax">
        </div>

        <div class="calendar-wrapper">
            <button id="calendarButton" class="calendar-btn">
                🗓️ GD im Kalender eintragen
            </button>
        </div>

        <div class="feedback-wrapper" id="feedbackForm">
            <input type="text" id="feedbackText" class="feedback-input" placeholder="Ein anonymer Gedanke dazu..." maxlength="200">
            <button id="sendFeedbackBtn" class="feedback-btn">Gedanken senden</button>
        </div>
    </div>

    <script type="module">
        // Versionierung verhindert, dass das iPhone alte Daten cacht
        import { smsglaubeInhalt } from './daten.js?v=2026-06-09';

        // 1. Daten in die HTML-Struktur einsetzen
        document.getElementById('outputUeberschrift').innerText = smsglaubeInhalt.ueberschrift;
        document.getElementById('outputInitiale').innerText = smsglaubeInhalt.initiale;
        document.getElementById('outputText1').innerText = smsglaubeInhalt.text1;
        document.getElementById('outputBibelvers').innerText = smsglaubeInhalt.bibelvers;
        document.getElementById('outputText2').innerText = smsglaubeInhalt.text2;

        // 2. Cross-Platform Parallax-Steuerung für iOS & Android
        const img = document.getElementById('parallaxImg');
        window.addEventListener('scroll', () => {
            const speed = 0.2; 
            const rect = img.parentElement.getBoundingClientRect();
            const viewHeight = window.innerHeight;
            
            if (rect.top < viewHeight && rect.bottom > 0) {
                const shift = (viewHeight - rect.top) * speed - 40;
                img.style.transform = `translateY(${shift}px) scale(1.15)`; 
            }
        });

        // 3. Kalender-Logik (.ics Datei live generieren)
        document.getElementById('calendarButton').addEventListener('click', () => {
            const dateStr = smsglaubeInhalt.gdTermin.replace(/-/g, ''); 
            const timeStr = smsglaubeInhalt.gdUhrzeit.replace(/:/g, ''); 
            
            const startTime = `${dateStr}T${timeStr}00`;
            const endTime = `${dateStr}T${parseInt(timeStr) + 100}00`; 

            const icsLines = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//SMSGlaube//KalenderButton//DE',
                'BEGIN:VEVENT',
                `SUMMARY:${smsglaubeInhalt.gdThema}`,
                `DTSTART:${startTime}`,
                `DTEND:${endTime}`,
                `LOCATION:${smsglaubeInhalt.gdOrt}`,
                'DESCRIPTION:Erinnerung aus deinem SMS-Glauben Impuls.',
                'END:VEVENT',
                'END:VCALENDAR'
            ];

            const blob = new Blob([icsLines.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'gottesdienst.ics';
            link.click();
        });

        // 4. Anonymes Feedback via Google Formular absenden
        document.getElementById('sendFeedbackBtn').addEventListener('click', async () => {
            const text = document.getElementById('feedbackText').value.trim();
            if (!text) return;

            const button = document.getElementById('sendFeedbackBtn');
            button.innerText = "Wird gesendet...";

            // HIER die IDs aus deinem Google-Formular einfügen
            const formURL = "https://docs.google.com/forms/u/0/d/e/DEINE_FORMULAR_ID/formResponse";
            const entryID = "entry.DEINE_EINGABE_FELD_ID";

            const formData = new FormData();
            formData.append(entryID, text);

            try {
                await fetch(formURL, { method: "POST", body: formData, mode: "no-cors" });
                document.getElementById('feedbackForm').innerHTML = `
                    <p style="font-size: 13px; color: #006994; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 10px;">
                        🕊️ Danke für deinen Gedanken.
                    </p>`;
            } catch (err) {
                console.error(err);
                button.innerText = "Fehler. Erneut versuchen?";
            }
        });

        // 5. Deine Share-Funktion (unverändert)
        document.getElementById('shareButton').addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation(); 
            
            const button = document.getElementById('shareButton');
            const textSpan = document.getElementById('shareBtnText');
            const originalHTML = textSpan.innerHTML;

            try {
                textSpan.innerText = "Erstelle Bild...";
                button.style.visibility = 'hidden';

                const canvas = await html2canvas(document.getElementById('captureArea'), {
                    useCORS: true,
                    backgroundColor: '#fdfbf7',
                    scale: 2
                });

                button.style.visibility = 'visible';
                textSpan.innerText = "Teilen...";

                canvas.toBlob(async (blob) => {
                    if (!blob) throw new Error('Bildgenerierung fehlgeschlagen.');
                    const file = new File([blob], 'SMS-Glaube.jpg', { type: 'image/jpeg' });

                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'SMS-Glaube',
                            text: 'KG Heringsdorf-Bansin'
                        });
                    } else {
                        alert('Das Teilen von generierten Bildern wird von diesem Browser/Gerät leider nicht unterstützt.');
                    }
                    textSpan.innerHTML = originalHTML;
                }, 'image/jpeg', 0.9);

            } catch (err) {
                console.error('Fehler:', err);
                button.style.visibility = 'visible';
                textSpan.innerHTML = originalHTML;
            }
        });
    </script>

</body>
</html>
